<!DOCTYPE html>
<html>

<head>
    <title>Simple Data Storage App</title>
</head>
<body>

    <h1>Data Entry System</h1>

    <form method="POST">
    <h2>Information Storage</h2>
    
    <form action="/save" method="POST">
        <input type="text" name="user_content" maxlength="50" placeholder="Enter your name">
        <button type="submit">Save to Database</button>
    </form>

    <form action="/clear" method="post">
    <button type="submit">Clear All</button>
    </form>

    <hr>

    <h3>Saved Entries</h3>
    <ul>
        <!-- This loop runs for every name passed from app.py -->
        <p>Total entries: {{ count }}</p>
        {% for name in names %}
            <li>{{ name }}</li>
        {% endfor %}

    </ul>
</body>
</html>
