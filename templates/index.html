<!DOCTYPE html>
<html>
<body>
    <h2>Store Information</h2>
    
    <form action="/save" method="POST">
        <input type="text" name="user_content" placeholder="Enter a name...">
        <button type="submit">Save to Database</button>
    </form>

    <hr>

    <h3>Stored Names:</h3>
    <ul>
        <!-- This loop runs for every name passed from app.py -->
        {% for name in names %}
            <li>{{ name }}</li>
        {% endfor %}

    </ul>
</body>
</html>
